<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>

<style>
body {
    font-family: Arial;
    background-color: #8f8f8f;
    margin: 0;
}

.container {
    width: 380px;
    margin: 80px auto;
    padding: 25px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    text-align: center;
}

h2 {
    color: #c0392b;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}

input[type="submit"] {
    background-color: #e74c3c;
    color: white;
    border: none;
    padding: 10px;
    width: 95%;
    border-radius: 5px;
    cursor: pointer;
}

input[type="submit"]:hover {
    background-color: #c0392b;
}

.secondary-btn {
    background-color: #7f8c8d;
    color: white;
    border: none;
    padding: 10px;
    width: 95%;
    border-radius: 5px;
    cursor: pointer;
}

.secondary-btn:hover {
    background-color: #555;
}

.success {
    color: green;
}
</style>

</head>

<body>

<div class="container">

<h2>Edit Profile</h2>

{% if success %}
    <p class="success">{{ success }}</p>
{% endif %}

<form method="post">
    {% csrf_token %}

    <input type="text" name="fullName" value="{{ user.fullname }}" placeholder="Full Name">
    <input type="email" name="email" value="{{ user.email }}" placeholder="Email">
    <input type="text" name="dob" value="{{ user.dob|date:'m/d/Y' }}" placeholder="MM/DD/YYYY">
    <input type="text" name="address" value="{{ user.address }}" placeholder="Address">
    <input type="text" name="phone" value="{{ user.phone }}" placeholder="Phone">

    <input type="submit" value="Save Changes">
</form>

<br>

<a href="{% url 'loginUser' %}">
    <button class="secondary-btn">Back</button>
</a>

</div>

</body>
</html>
