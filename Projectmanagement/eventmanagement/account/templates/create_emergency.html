<!DOCTYPE html>
<html>
<head>
    <title>Create Emergency</title>

    <style>
        body {
            font-family: Arial;
            background-color: #8f8f8f;
        }

        .container {
            width: 350px;
            margin: 100px auto;
            padding: 25px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        h2 {
            color: #e74c3c;
        }

        input, textarea {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        input[type="submit"] {
            background-color: #e74c3c;
            color: white;
            border: none;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #c0392b;
        }
    </style>
</head>

<body>

<div class="container">

<h2>Create Emergency</h2>

<form method="post">
    {% csrf_token %}

    <input type="text" name="title" placeholder="Emergency Title">
    <textarea name="description" placeholder="Describe the situation"></textarea>

    <input type="submit" value="Submit">
</form>

    <br>


<a href="{% url 'loginUser' %}">
    <button type="button" class="secondary-btn">Back</button>
</a>
</div>

</body>
</html>
